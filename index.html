<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quant Project Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Quant Project Tracker</h1>
      <p>Project tracking and dashboard (MVP)</p>
    </header>

    <main class="container">
      <section class="card metrics">
        <h2>Core Metrics</h2>
        <div id="metricsGrid" class="grid"></div>
      </section>

      <section class="card">
        <h2>Project List</h2>
        <table>
          <thead>
            <tr>
              <th>Project</th>
              <th>Stage</th>
              <th>Progress</th>
              <th>Owner</th>
              <th>Updated</th>
            </tr>
          </thead>
          <tbody id="projectTable"></tbody>
        </table>
      </section>

      <section class="card">
        <h2>High-Priority Todos</h2>
        <ul id="todoList"></ul>
      </section>
    </main>

    <footer class="footer">v0.1 · static MVP</footer>
    <script src="app.js"></script>
  </body>
</html>
