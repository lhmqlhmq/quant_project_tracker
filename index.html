<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quant Project Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-row">
        <div>
          <h1>Quant Project Tracker</h1>
          <p id="subtitle">Project tracking and dashboard (MVP)</p>
        </div>
        <div class="lang-switch">
          <label for="langSelect">Language</label>
          <select id="langSelect" aria-label="Language selector">
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="card metrics">
        <h2 id="sectionMetrics">Core Metrics</h2>
        <div id="metricsGrid" class="grid"></div>
      </section>

      <section class="card">
        <h2 id="sectionProjects">Project List</h2>
        <table>
          <thead>
            <tr>
              <th id="thProject">Project</th>
              <th id="thStage">Stage</th>
              <th id="thProgress">Progress</th>
              <th id="thOwner">Owner</th>
              <th id="thUpdated">Updated</th>
            </tr>
          </thead>
          <tbody id="projectTable"></tbody>
        </table>
      </section>

      <section class="card">
        <h2 id="sectionTodos">High-Priority Todos</h2>
        <ul id="todoList"></ul>
      </section>
    </main>

    <footer class="footer">v0.2 · bilingual MVP</footer>
    <script src="app.js"></script>
  </body>
</html>
