<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quant Project Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-row">
        <div>
          <h1>Quant Project Tracker</h1>
          <p id="subtitle">Project tracking and dashboard (MVP)</p>
        </div>
        <div class="lang-switch" role="group" aria-label="Language switcher">
          <button id="btnEn" class="lang-btn" type="button">EN</button>
          <button id="btnZh" class="lang-btn" type="button">中文</button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="card metrics">
        <h2 id="sectionMetrics">Core Metrics</h2>
        <div id="metricsGrid" class="grid"></div>
      </section>

      <section class="card">
        <h2 id="sectionProjects">Project List</h2>
        <table>
          <thead>
            <tr>
              <th id="thProject">Project</th>
              <th id="thStage">Stage</th>
              <th id="thProgress">Progress</th>
              <th id="thOwner">Owner</th>
              <th id="thUpdated">Updated</th>
            </tr>
          </thead>
          <tbody id="projectTable"></tbody>
        </table>
      </section>

      <section class="card">
        <h2 id="sectionGantt">Roadmap Gantt</h2>
        <div id="ganttBoard" class="gantt-board"></div>
      </section>

      <section class="card">
        <h2 id="sectionAgents">Agent Focus & Next Step</h2>
        <div id="agentBoard" class="agent-board"></div>
      </section>

      <section class="card">
        <h2 id="sectionTodos">High-Priority Todos</h2>
        <ul id="todoList"></ul>
      </section>
    </main>

    <footer class="footer">v0.4 · bilingual + gantt + agent board</footer>
    <script src="app.js?v=20260302-2"></script>
  </body>
</html>
